<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AstraSix Technical Services LLC</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial;
scroll-behavior:smooth;
}

body{
background:#050505;
color:#fff;
overflow-x:hidden;
}

.cursor{
position:fixed;
width:250px;
height:250px;
border-radius:50%;
background:radial-gradient(circle,#00e5ff55,transparent 70%);
transform:translate(-50%,-50%);
pointer-events:none;
z-index:0;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
padding:18px 50px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:1000;
}

nav a{
color:#fff;
margin-left:20px;
text-decoration:none;
transition:0.3s;
}

nav a:hover{ color:#00e5ff; }

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:60px;
color:#00e5ff;
text-shadow:0 0 20px #00e5ff;
}

.hero p{ opacity:0.8; margin-top:10px; }

.btn{
margin-top:25px;
padding:12px 28px;
border:1px solid #00e5ff;
color:#00e5ff;
cursor:pointer;
display:inline-block;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
background:#00e5ff;
color:#000;
}

.section{
padding:100px 10%;
text-align:center;
z-index:1;
position:relative;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
background:#111;
border:1px solid #333;
color:#fff;
}

footer{
text-align:center;
padding:25px;
background:#000;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}
</style>
</head>

<body>

<div class="cursor"></div>
<canvas id="particles"></canvas>

<header>
<h2>AstraSix</h2>
<nav>
<a href="#home">Home</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero" id="home">
<h1>Engineering Intelligent Spaces</h1>
<p>MEP • Lighting • Automation • ELV Systems</p>
</section>

<section class="section" id="contact">
<h2>Contact Us</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<textarea id="message" rows="5" placeholder="Project Details"></textarea>

<button class="btn" onclick="sendMessage()">Send Message</button>
</section>

<footer>
© 2026 AstraSix Technical Services LLC
</footer>

<script>

/* CURSOR */
const cursor = document.querySelector(".cursor");
document.addEventListener("mousemove", e=>{
cursor.style.left = e.clientX + "px";
cursor.style.top = e.clientY + "px";
});

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x += p.dx;
p.y += p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00e5ff";
ctx.fill();
});

requestAnimationFrame(animate);
}
animate();


/* SEND MESSAGE - PROFESSIONAL FORMAT */
function sendMessage(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let message = document.getElementById("message").value.trim();

if(!name || !email || !message){
alert("Please fill all fields");
return;
}

/* PROFESSIONAL EMAIL TEMPLATE */
let emailBody =
`New Project Inquiry – AstraSix Technical Services LLC

Name: ${name}
Email: ${email}

Message:
${message}

--
Sent from AstraSix Website`;

/* MAILTO */
let mailtoLink =
`mailto:info@astrasix.ae?subject=${encodeURIComponent("New Project Inquiry - AstraSix")}&body=${encodeURIComponent(emailBody)}`;

/* WHATSAPP TEMPLATE */
let whatsappMessage =
`*New Project Inquiry – AstraSix Technical Services LLC*

Name: ${name}
Email: ${email}

Message:
${message}

Sent from AstraSix Website`;

/* OPEN */
window.open(mailtoLink, "_blank");
window.open("https://wa.me/971523363396?text=" + encodeURIComponent(whatsappMessage), "_blank");

}

</script>

</body>
</html>
